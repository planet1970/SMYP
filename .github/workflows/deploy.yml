name: Deploy Frontend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create Frontend Directory on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: mkdir -p /var/www/smyp

      - name: Copy files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "dist/*"
          target: "/var/www/smyp"
          strip_components: 1

      - name: Configure Nginx on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # Nginx config dosyasını kontrol et/oluştur
            if [ ! -f /etc/nginx/sites-available/smyp.edirnego.com ]; then
              sudo bash -c 'cat > /etc/nginx/sites-available/smyp.edirnego.com <<EOF
            server {
                listen 80;
                server_name smyp.edirnego.com;
                root /var/www/smyp;
                index index.html;
                location / {
                    try_files \$uri \$uri/ /index.html;
                }
            }
            EOF'
              sudo ln -s /etc/nginx/sites-available/smyp.edirnego.com /etc/nginx/sites-enabled/ || true
              sudo nginx -t && sudo systemctl reload nginx || true
            fi
